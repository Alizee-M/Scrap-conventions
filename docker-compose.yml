services:
  scrap-conventions:
    image: ghcr.io/alizee-m/scrap-conventions:latest
    container_name: scrap-conventions
    restart: unless-stopped
    ports:
      - "5050:5000"
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - ALERT_CITY=${ALERT_CITY:-}
      - ALERT_RADIUS_KM=${ALERT_RADIUS_KM:-50}
      - ALERT_TEST_PASSWORD=${ALERT_TEST_PASSWORD:-}
    volumes:
      - scrap-conventions-cache:/app/cache

volumes:
  scrap-conventions-cache:
