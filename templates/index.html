<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrap-Conventions</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --border: #2a2a3a;
    --accent: #e040fb;
    --accent2: #7c4dff;
    --text: #e8e8f0;
    --muted: #888899;
    --card-bg: #16161f;
    --green: #00e676;
    --orange: #ff9100;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: linear-gradient(135deg, #1a0a2e 0%, #16082e 50%, #0d0d1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 1.2rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p { color: var(--muted); font-size: 0.82rem; margin-top: 0.15rem; }

  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.9rem 2rem;
    display: flex;
    gap: 0.8rem;
    align-items: center;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .search-wrap {
    display: flex;
    flex: 1;
    min-width: 220px;
    gap: 0.5rem;
  }

  input[type="text"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 0.55rem 1rem;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }

  button {
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.55rem 1.1rem;
    font-size: 0.88rem;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: default; }

  .btn-group { display: flex; gap: 0.4rem; }

  .btn-group button {
    background: var(--border);
    font-size: 0.82rem;
    padding: 0.48rem 0.85rem;
  }

  .btn-group button.active { background: var(--accent); }

  .btn-refresh {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.78rem;
    padding: 0.48rem 0.75rem;
  }

  .btn-refresh:hover { color: var(--text); border-color: var(--accent); }

  .stats {
    padding: 0.6rem 2rem;
    color: var(--muted);
    font-size: 0.8rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* ── Views ── */
  .view { display: none; flex: 1; overflow: hidden; }
  .view.active { display: flex; flex-direction: column; }

  /* ── Card view ── */
  #view-list { overflow-y: auto; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 1rem;
    padding: 1.2rem 2rem;
    align-content: start;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.15s, border-color 0.15s;
    display: flex;
    flex-direction: column;
    cursor: pointer;
  }

  .card:hover { transform: translateY(-2px); border-color: var(--accent2); }

  .card-img {
    width: 100%;
    height: 130px;
    object-fit: cover;
    background: var(--surface);
  }

  .card-img-placeholder {
    width: 100%;
    height: 130px;
    background: linear-gradient(135deg, #1a0a2e, #0d0d1a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
  }

  .card-body { padding: 0.85rem; flex: 1; display: flex; flex-direction: column; gap: 0.45rem; }

  .card-name { font-size: 0.95rem; font-weight: 600; line-height: 1.3; }
  .card-name a { color: var(--text); text-decoration: none; }
  .card-name a:hover { color: var(--accent); }

  .card-meta { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: auto; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.2rem 0.55rem;
    border-radius: 20px;
    font-size: 0.74rem;
    font-weight: 500;
  }

  .badge-date { background: rgba(124, 77, 255, 0.2); color: var(--accent2); border: 1px solid rgba(124,77,255,0.3); }
  .badge-loc  { background: rgba(0, 230, 118, 0.1); color: var(--green); border: 1px solid rgba(0,230,118,0.2); }
  .badge-dist { background: rgba(255, 145, 0, 0.15); color: var(--orange); border: 1px solid rgba(255,145,0,0.3); }

  .empty, .loader {
    grid-column: 1/-1;
    text-align: center;
    padding: 4rem;
    color: var(--muted);
  }

  .loader-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    margin: 0 3px;
  }

  .loader-dot:nth-child(2) { animation-delay: 0.2s; }
  .loader-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-12px); }
  }

  /* ── Map view ── */
  #view-map { position: relative; }

  #map {
    flex: 1;
    width: 100%;
    min-height: 0;
  }

  /* Dark tile filter */
  .leaflet-tile { filter: brightness(0.85) saturate(0.8); }

  /* Popup styling */
  .leaflet-popup-content-wrapper {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .leaflet-popup-tip { background: var(--surface); }

  .popup-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.4rem; line-height: 1.3; }
  .popup-name a { color: var(--accent); text-decoration: none; }
  .popup-name a:hover { text-decoration: underline; }
  .popup-meta { font-size: 0.8rem; color: var(--muted); display: flex; flex-direction: column; gap: 0.2rem; }
  .popup-dist { color: var(--orange); font-weight: 600; margin-top: 0.3rem; }

  @media (max-width: 600px) {
    .controls { padding: 0.8rem 1rem; }
    .grid { padding: 0.8rem 1rem; }
    header { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Scrap-Conventions</h1>
    <p>Conventions manga & culture japonaise — France &amp; voisins</p>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="location" placeholder="Ta ville (ex: Saint-Estève, Lyon...)" />
    <button id="btn-search">Chercher</button>
  </div>
  <div class="btn-group">
    <button id="btn-date" class="active" onclick="setSort('date')">Par date</button>
    <button id="btn-dist" onclick="setSort('distance')">Par distance</button>
  </div>
  <div class="btn-group">
    <button id="btn-view-list" class="active" onclick="setView('list')">Liste</button>
    <button id="btn-view-map" onclick="setView('map')">Carte</button>
  </div>
  <button class="btn-refresh" id="btn-refresh" onclick="refresh()">Actualiser</button>
</div>

<div class="stats" id="stats"></div>

<!-- List view -->
<div id="view-list" class="view active">
  <div class="grid" id="grid">
    <div class="loader">
      <div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div>
      <p style="margin-top:1rem">Chargement des conventions...</p>
    </div>
  </div>
</div>

<!-- Map view -->
<div id="view-map" class="view">
  <div id="map"></div>
</div>

<script>
let currentSort = 'date';
let currentView = 'list';
let userLat = null;
let userLon = null;
let conventions = [];

// ── Leaflet map ──────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([46.6, 2.3], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 18,
}).addTo(map);

const convIcon = L.divIcon({
  className: '',
  html: `<div style="
    background: #7c4dff;
    border: 2px solid #e040fb;
    border-radius: 50%;
    width: 14px; height: 14px;
    box-shadow: 0 0 6px #e040fb88;
  "></div>`,
  iconSize: [14, 14],
  iconAnchor: [7, 7],
  popupAnchor: [0, -10],
});

const userIcon = L.divIcon({
  className: '',
  html: `<div style="
    background: #ff9100;
    border: 2px solid #fff;
    border-radius: 50%;
    width: 16px; height: 16px;
    box-shadow: 0 0 8px #ff9100;
  "></div>`,
  iconSize: [16, 16],
  iconAnchor: [8, 8],
  popupAnchor: [0, -10],
});

let markers = [];
let userMarker = null;

function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

function renderMap(data) {
  clearMarkers();

  if (userMarker) map.removeLayer(userMarker);
  if (userLat !== null) {
    userMarker = L.marker([userLat, userLon], { icon: userIcon })
      .addTo(map)
      .bindPopup('<b style="color:#ff9100">Ta position</b>');
    map.setView([userLat, userLon], 9);
  }

  data.forEach(c => {
    if (!c.lat || !c.lon) return;
    const dist = c.distance_km !== null ? `<div class="popup-dist">🗺️ ${Math.round(c.distance_km)} km</div>` : '';
    const popup = `
      <div class="popup-name">${c.url ? `<a href="${c.url}" target="_blank">${c.name}</a>` : c.name}</div>
      <div class="popup-meta">
        ${c.date ? `<span>📅 ${fmtDate(c.date)}</span>` : ''}
        ${c.location ? `<span>📍 ${c.location}</span>` : ''}
        ${dist}
      </div>`;
    const m = L.marker([c.lat, c.lon], { icon: convIcon })
      .addTo(map)
      .bindPopup(popup, { maxWidth: 260 });
    markers.push(m);
  });
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '?';
  return new Date(iso + 'T12:00:00').toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
}

function fmtDist(km) {
  if (km === null || km === undefined) return null;
  return km < 1 ? '< 1 km' : `${Math.round(km)} km`;
}

function setSort(s) {
  currentSort = s;
  document.getElementById('btn-date').classList.toggle('active', s === 'date');
  document.getElementById('btn-dist').classList.toggle('active', s === 'distance');
  renderAll(conventions);
}

function setView(v) {
  currentView = v;
  document.getElementById('btn-view-list').classList.toggle('active', v === 'list');
  document.getElementById('btn-view-map').classList.toggle('active', v === 'map');
  document.getElementById('view-list').classList.toggle('active', v === 'list');
  document.getElementById('view-map').classList.toggle('active', v === 'map');
  if (v === 'map') {
    map.invalidateSize();
    renderMap(sorted(conventions));
  }
}

function sorted(data) {
  const copy = [...data];
  if (currentSort === 'distance' && userLat !== null) {
    copy.sort((a, b) => (a.distance_km ?? 99999) - (b.distance_km ?? 99999));
  } else {
    copy.sort((a, b) => (a.date || '9999').localeCompare(b.date || '9999'));
  }
  return copy;
}

function renderList(data) {
  const grid = document.getElementById('grid');
  if (!data.length) {
    grid.innerHTML = '<div class="empty">Aucune convention trouvée.</div>';
    return;
  }
  grid.innerHTML = data.map(c => {
    const dist = fmtDist(c.distance_km);
    const imgHtml = c.image
      ? `<img class="card-img" src="${c.image}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="card-img-placeholder">🎌</div>`;
    return `
    <div class="card" onclick="${c.url ? `window.open('${c.url}','_blank')` : ''}">
      ${imgHtml}
      <div class="card-body">
        <div class="card-name">
          ${c.url ? `<a href="${c.url}" target="_blank" rel="noopener">${c.name}</a>` : c.name}
        </div>
        <div class="card-meta">
          ${c.date ? `<span class="badge badge-date">📅 ${fmtDate(c.date)}</span>` : ''}
          ${c.location ? `<span class="badge badge-loc">📍 ${c.location}</span>` : ''}
          ${dist ? `<span class="badge badge-dist">🗺️ ${dist}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderAll(data) {
  const s = sorted(data);
  const stats = document.getElementById('stats');
  stats.textContent = `${s.length} convention${s.length > 1 ? 's' : ''} à venir${userLat !== null ? ' · ' + (currentSort === 'distance' ? 'par distance' : 'par date') : ''}`;
  renderList(s);
  if (currentView === 'map') renderMap(s);
}

// ── Data loading ─────────────────────────────────────────────────────────────
async function load() {
  const loc = document.getElementById('location').value.trim();
  const grid = document.getElementById('grid');
  grid.innerHTML = '<div class="loader"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div><p style="margin-top:1rem">Chargement...</p></div>';

  let url = `/api/conventions?sort=${currentSort}`;
  if (loc) url += `&location=${encodeURIComponent(loc)}`;

  try {
    const resp = await fetch(url);
    const data = await resp.json();
    conventions = data.conventions;
    userLat = data.user_lat;
    userLon = data.user_lon;

    if (loc && userLat === null) {
      document.getElementById('stats').textContent = `Ville "${loc}" non trouvée.`;
    }

    renderAll(conventions);
  } catch (e) {
    grid.innerHTML = '<div class="empty">Erreur de chargement. Réessaie.</div>';
  }
}

async function refresh() {
  const btn = document.getElementById('btn-refresh');
  btn.disabled = true;
  btn.textContent = 'En cours...';
  try {
    await fetch('/api/refresh', { method: 'POST' });
    await load();
  } finally {
    btn.disabled = false;
    btn.textContent = 'Actualiser';
  }
}

document.getElementById('btn-search').addEventListener('click', load);
document.getElementById('location').addEventListener('keydown', e => {
  if (e.key === 'Enter') load();
});

load();
</script>
</body>
</html>
