<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Scrap-Conventions</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --border: #2a2a3a;
    --accent: #e040fb;
    --accent2: #7c4dff;
    --text: #e8e8f0;
    --muted: #888899;
    --card-bg: #16161f;
    --green: #00e676;
    --orange: #ff9100;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #1a0a2e, #0d0d1a);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 1.25rem;
    font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
  }

  header p {
    color: var(--muted);
    font-size: 0.72rem;
    margin-top: 0.1rem;
    display: none;
  }

  /* ── Controls ── */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    flex-shrink: 0;
  }

  .controls-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  input[type="text"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 0.6rem 0.85rem;
    font-size: 0.9rem;
    outline: none;
    min-height: 44px;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  input[type="text"]:focus { border-color: var(--accent); }

  .location-wrap {
    position: relative;
    flex: 1;
    min-width: 0;
  }

  .location-wrap input[type="text"] { width: 100%; }

  .suggestions {
    display: none;
    position: absolute;
    top: calc(100% + 0.3rem);
    left: 0;
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    overflow: hidden;
    z-index: 50;
  }

  .suggestions.open { display: block; }

  .suggestion-item {
    padding: 0.6rem 0.85rem;
    font-size: 0.85rem;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
  }

  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover, .suggestion-item.highlighted { background: var(--border); }
  .suggestion-item .sugg-postcode { color: var(--muted); font-size: 0.78rem; margin-left: 0.4rem; }

  button {
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0 1rem;
    font-size: 0.88rem;
    cursor: pointer;
    min-height: 44px;
    white-space: nowrap;
    transition: opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  button:hover { opacity: 0.85; }
  button:active { opacity: 0.7; }
  button:disabled { opacity: 0.4; cursor: default; }

  .btn-group {
    display: flex;
    gap: 0.35rem;
    flex: 1;
  }

  .btn-group button {
    flex: 1;
    background: var(--border);
    font-size: 0.8rem;
    padding: 0 0.5rem;
  }

  .btn-group button.active { background: var(--accent); }

  .btn-refresh {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.78rem;
    padding: 0 0.75rem;
    flex-shrink: 0;
  }

  /* ── Filters ── */
  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    flex: 1;
    min-width: 160px;
  }

  .filter-label {
    color: var(--muted);
    font-size: 0.72rem;
  }

  .filter-label span { color: var(--orange); font-weight: 600; }

  input[type="range"] {
    width: 100%;
    height: 32px;
    background: transparent;
    -webkit-appearance: none;
  }

  input[type="range"]::-webkit-slider-runnable-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid #fff;
    margin-top: -8px;
    cursor: pointer;
  }

  input[type="range"]::-moz-range-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
  }

  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid #fff;
    cursor: pointer;
  }

  .date-range-inputs {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    color: var(--muted);
  }

  input[type="date"] {
    flex: 1;
    min-width: 0;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 0.45rem 0.5rem;
    font-size: 0.8rem;
    outline: none;
    min-height: 38px;
    -webkit-appearance: none;
    color-scheme: dark;
  }

  input[type="date"]:focus { border-color: var(--accent); }

  /* ── Stats ── */
  .stats {
    padding: 0.4rem 0.75rem;
    color: var(--muted);
    font-size: 0.75rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Views ── */
  .view { display: none; flex: 1; overflow: hidden; min-height: 0; }
  .view.active { display: flex; flex-direction: column; }

  /* ── List view ── */
  #view-list { overflow-y: auto; -webkit-overflow-scrolling: touch; }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.75rem;
    padding: 0.75rem;
    align-content: start;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: row;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.15s;
    min-height: 90px;
  }

  .card:active { border-color: var(--accent2); }

  .card-img {
    width: 90px;
    min-width: 90px;
    object-fit: cover;
    background: var(--surface);
  }

  .card-img-placeholder {
    width: 90px;
    min-width: 90px;
    background: linear-gradient(135deg, #1a0a2e, #0d0d1a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
  }

  .card-body {
    padding: 0.65rem 0.75rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    min-width: 0;
  }

  .card-name {
    font-size: 0.88rem;
    font-weight: 600;
    line-height: 1.3;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .card-name a { color: var(--text); text-decoration: none; }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-top: auto;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.2rem;
    padding: 0.18rem 0.5rem;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 500;
    white-space: nowrap;
  }

  .badge-date { background: rgba(124,77,255,0.2); color: var(--accent2); border: 1px solid rgba(124,77,255,0.3); }
  .badge-loc  { background: rgba(0,230,118,0.1);  color: var(--green);   border: 1px solid rgba(0,230,118,0.2); max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
  .badge-dist { background: rgba(255,145,0,0.15); color: var(--orange);  border: 1px solid rgba(255,145,0,0.3); }

  .empty, .loader {
    grid-column: 1/-1;
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }

  .loader-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    margin: 0 3px;
  }

  .loader-dot:nth-child(2) { animation-delay: 0.2s; }
  .loader-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40%           { transform: translateY(-10px); }
  }

  /* ── Map view ── */
  #view-map { position: relative; }

  #map { flex: 1; width: 100%; min-height: 0; }

  .leaflet-tile { filter: brightness(0.85) saturate(0.8); }

  .leaflet-popup-content-wrapper {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .leaflet-popup-tip { background: var(--surface); }

  .popup-name { font-weight: 700; font-size: 1.05rem; margin-bottom: 0.4rem; line-height: 1.35; }
  .popup-name a { color: var(--accent); text-decoration: none; }
  .popup-meta { font-size: 0.92rem; color: var(--muted); display: flex; flex-direction: column; gap: 0.3rem; line-height: 1.4; }
  .popup-dist { color: var(--orange); font-weight: 600; margin-top: 0.3rem; }

  /* ── Desktop overrides ── */
  @media (min-width: 640px) {
    header { padding: 1rem 2rem; }
    header h1 { font-size: 1.5rem; }
    header p { display: block; }

    .controls {
      flex-direction: row;
      flex-wrap: wrap;
      padding: 0.75rem 1.5rem;
      align-items: center;
    }

    .controls-row { flex: none; }
    .controls-row-search { flex: 1; }

    .btn-group { flex: none; }
    .btn-group button { flex: none; padding: 0 0.85rem; }

    .filter-group { flex: none; min-width: 220px; }

    .stats { padding: 0.5rem 1.5rem; font-size: 0.8rem; }

    .grid {
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
      padding: 1.2rem 1.5rem;
    }

    .card {
      flex-direction: column;
      min-height: unset;
    }

    .card-img {
      width: 100%;
      min-width: unset;
      height: 130px;
    }

    .card-img-placeholder {
      width: 100%;
      min-width: unset;
      height: 130px;
      font-size: 2.2rem;
    }

    .card:hover { border-color: var(--accent2); transform: translateY(-2px); }

    .badge-loc { max-width: none; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Scrap-Conventions</h1>
    <p>Conventions manga & culture japonaise — France &amp; voisins</p>
  </div>
  <a href="/sources" style="margin-left:auto; color:var(--muted); font-size:0.75rem; text-decoration:none; border:1px solid var(--border); padding:0.35rem 0.7rem; border-radius:8px; white-space:nowrap;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">Sources</a>
</header>

<div class="controls">
  <!-- Row 1 : sort + view + refresh -->
  <div class="controls-row" style="width:100%; justify-content:space-between;">
    <div class="btn-group">
      <button id="btn-date" class="active" onclick="setSort('date')">Par date</button>
      <button id="btn-dist" onclick="setSort('distance')">Par distance</button>
    </div>
    <div class="btn-group" style="margin-left:0.5rem;">
      <button id="btn-view-list" class="active" onclick="setView('list')">Liste</button>
      <button id="btn-view-map" onclick="setView('map')">Carte</button>
    </div>
    <button class="btn-refresh" id="btn-refresh" onclick="refresh()" style="margin-left:0.5rem;">↺</button>
  </div>
  <!-- Row 2 : filters -->
  <div class="controls-row" style="width:100%; flex-wrap:wrap; gap:0.7rem;">
    <div class="filter-group">
      <label class="filter-label">Distance max : <span id="dist-value">Toutes distances</span></label>
      <input type="range" id="distance-slider" min="0" max="600" step="20" value="600">
    </div>
    <div class="filter-group">
      <label class="filter-label">Période</label>
      <div class="btn-group" id="date-presets">
        <button class="active" onclick="setDatePreset('all', this)">Tout</button>
        <button onclick="setDatePreset('month', this)">Ce mois</button>
        <button onclick="setDatePreset('3months', this)">3 mois</button>
        <button onclick="setDatePreset('year', this)">Cette année</button>
      </div>
    </div>
    <div class="filter-group date-range">
      <label class="filter-label">Du / au</label>
      <div class="date-range-inputs">
        <input type="date" id="date-from">
        <span>→</span>
        <input type="date" id="date-to">
      </div>
    </div>
  </div>
  <!-- Row 3 : search (ville, en dernier) -->
  <div class="controls-row controls-row-search" style="flex:1; width:100%;">
    <div class="location-wrap">
      <input type="text" id="location" placeholder="Ta ville (ex: Saint-Estève...)" autocomplete="off" value="Saint-Estève" />
      <div id="location-suggestions" class="suggestions"></div>
    </div>
    <button id="btn-search">Chercher</button>
  </div>
</div>

<div class="stats" id="stats"></div>

<!-- List view -->
<div id="view-list" class="view active">
  <div class="grid" id="grid">
    <div class="loader">
      <div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div>
      <p style="margin-top:1rem">Chargement des conventions...</p>
    </div>
  </div>
</div>

<!-- Map view -->
<div id="view-map" class="view">
  <div id="map"></div>
</div>

<script>
let currentSort = 'date';
let currentView = 'list';
let userLat = null;
let userLon = null;
let conventions = [];
let distanceMax = null;
let dateFrom = null;
let dateTo = null;
const DIST_SLIDER_MAX = 600;

// ── Leaflet ──────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([46.6, 2.3], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a>',
  maxZoom: 18,
}).addTo(map);

const convIcon = L.divIcon({
  className: '',
  html: `<div style="background:#7c4dff;border:2px solid #e040fb;border-radius:50%;width:14px;height:14px;box-shadow:0 0 6px #e040fb88;"></div>`,
  iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -10],
});

const userIcon = L.divIcon({
  className: '',
  html: `<div style="background:#ff9100;border:2px solid #fff;border-radius:50%;width:16px;height:16px;box-shadow:0 0 8px #ff9100;"></div>`,
  iconSize: [16, 16], iconAnchor: [8, 8], popupAnchor: [0, -10],
});

let markers = [];
let userMarker = null;

function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

function renderMap(data) {
  clearMarkers();
  if (userMarker) map.removeLayer(userMarker);

  if (userLat !== null) {
    userMarker = L.marker([userLat, userLon], { icon: userIcon })
      .addTo(map).bindPopup('<b style="color:#ff9100">Ta position</b>');
    map.setView([userLat, userLon], 9);
  }

  data.forEach(c => {
    if (!c.lat || !c.lon) return;
    const dist = c.distance_km !== null ? `<div class="popup-dist">🗺️ ${Math.round(c.distance_km)} km</div>` : '';
    const popup = `
      <div class="popup-name">${c.url ? `<a href="${c.url}" target="_blank">${c.name}</a>` : c.name}</div>
      <div class="popup-meta">
        ${c.date ? `<span>📅 ${fmtDate(c.date)}</span>` : ''}
        ${c.location ? `<span>📍 ${c.location}</span>` : ''}
        ${dist}
      </div>`;
    markers.push(L.marker([c.lat, c.lon], { icon: convIcon }).addTo(map).bindPopup(popup, { maxWidth: 280, minWidth: 200 }));
  });
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '?';
  return new Date(iso + 'T12:00:00').toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
}

function fmtDist(km) {
  if (km === null || km === undefined) return null;
  return km < 1 ? '< 1 km' : `${Math.round(km)} km`;
}

function setSort(s) {
  currentSort = s;
  document.getElementById('btn-date').classList.toggle('active', s === 'date');
  document.getElementById('btn-dist').classList.toggle('active', s === 'distance');
  renderAll(conventions);
}

function setView(v) {
  currentView = v;
  document.getElementById('btn-view-list').classList.toggle('active', v === 'list');
  document.getElementById('btn-view-map').classList.toggle('active', v === 'map');
  document.getElementById('view-list').classList.toggle('active', v === 'list');
  document.getElementById('view-map').classList.toggle('active', v === 'map');
  if (v === 'map') { map.invalidateSize(); renderMap(sortedData(conventions)); }
}

function sortedData(data) {
  const copy = [...data];
  if (currentSort === 'distance' && userLat !== null) {
    copy.sort((a, b) => (a.distance_km ?? 99999) - (b.distance_km ?? 99999));
  } else {
    copy.sort((a, b) => (a.date || '9999').localeCompare(b.date || '9999'));
  }
  return copy;
}

function filterData(data) {
  return data.filter(c => {
    if (distanceMax !== null) {
      if (c.distance_km === null || c.distance_km === undefined || c.distance_km > distanceMax) return false;
    }
    if (dateFrom && (!c.date || c.date < dateFrom)) return false;
    if (dateTo && (!c.date || c.date > dateTo)) return false;
    return true;
  });
}

function setDatePreset(preset, btn) {
  document.querySelectorAll('#date-presets button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const pad = n => String(n).padStart(2, '0');
  const toISO = d => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
  const today = new Date();
  let from = null, to = null;

  if (preset === 'month') {
    from = new Date(today.getFullYear(), today.getMonth(), 1);
    to = new Date(today.getFullYear(), today.getMonth() + 1, 0);
  } else if (preset === '3months') {
    from = today;
    to = new Date(today.getFullYear(), today.getMonth() + 3, today.getDate());
  } else if (preset === 'year') {
    from = today;
    to = new Date(today.getFullYear(), 11, 31);
  }

  dateFrom = from ? toISO(from) : null;
  dateTo = to ? toISO(to) : null;
  document.getElementById('date-from').value = dateFrom || '';
  document.getElementById('date-to').value = dateTo || '';
  renderAll(conventions);
}

function renderList(data) {
  const grid = document.getElementById('grid');
  if (!data.length) { grid.innerHTML = '<div class="empty">Aucune convention trouvée.</div>'; return; }
  grid.innerHTML = data.map(c => {
    const dist = fmtDist(c.distance_km);
    const imgHtml = c.image
      ? `<img class="card-img" src="${c.image}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="card-img-placeholder">🎌</div>`;
    return `
    <div class="card" onclick="${c.url ? `window.open('${c.url}','_blank')` : ''}">
      ${imgHtml}
      <div class="card-body">
        <div class="card-name">${c.name}</div>
        <div class="card-meta">
          ${c.date ? `<span class="badge badge-date">📅 ${fmtDate(c.date)}</span>` : ''}
          ${c.location ? `<span class="badge badge-loc">📍 ${c.location}</span>` : ''}
          ${dist ? `<span class="badge badge-dist">🗺️ ${dist}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderAll(data) {
  const filtered = filterData(data);
  const s = sortedData(filtered);
  const filterNote = filtered.length !== data.length ? ` (sur ${data.length})` : '';
  document.getElementById('stats').textContent =
    `${s.length} convention${s.length > 1 ? 's' : ''}${filterNote} à venir` +
    (userLat !== null ? ` · ${currentSort === 'distance' ? 'par distance' : 'par date'}` : '');
  renderList(s);
  if (currentView === 'map') renderMap(s);
}

// ── Data ─────────────────────────────────────────────────────────────────────
async function load(coords) {
  const loc = document.getElementById('location').value.trim();
  document.getElementById('grid').innerHTML =
    '<div class="loader"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div><p style="margin-top:1rem">Chargement...</p></div>';

  let url = `/api/conventions?sort=${currentSort}`;
  if (coords) {
    url += `&lat=${coords.lat}&lon=${coords.lon}`;
  } else if (loc) {
    url += `&location=${encodeURIComponent(loc)}`;
  }

  try {
    const data = await fetch(url).then(r => r.json());
    conventions = data.conventions;
    userLat = data.user_lat;
    userLon = data.user_lon;
    if (loc && userLat === null)
      document.getElementById('stats').textContent = `Ville "${loc}" non trouvée.`;
    renderAll(conventions);
  } catch {
    document.getElementById('grid').innerHTML = '<div class="empty">Erreur de chargement. Réessaie.</div>';
  }
}

async function refresh() {
  const btn = document.getElementById('btn-refresh');
  btn.disabled = true;
  btn.textContent = '…';
  try { await fetch('/api/refresh', { method: 'POST' }); await load(); }
  finally { btn.disabled = false; btn.textContent = '↺'; }
}

// ── Autocomplétion ville (API Adresse data.gouv.fr) ─────────────────────────
const locationInput = document.getElementById('location');
const suggestionsBox = document.getElementById('location-suggestions');
let suggestions = [];
let highlightedIndex = -1;
let suggestDebounce = null;

function closeSuggestions() {
  suggestionsBox.classList.remove('open');
  suggestionsBox.innerHTML = '';
  suggestions = [];
  highlightedIndex = -1;
}

function renderSuggestions() {
  if (!suggestions.length) { closeSuggestions(); return; }
  suggestionsBox.innerHTML = suggestions.map((s, i) => `
    <div class="suggestion-item${i === highlightedIndex ? ' highlighted' : ''}" data-index="${i}">
      ${s.city}<span class="sugg-postcode">${s.postcode} · ${s.context}</span>
    </div>`).join('');
  suggestionsBox.classList.add('open');
}

async function fetchSuggestions(query) {
  try {
    const url = `https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(query)}&type=municipality&limit=5`;
    const data = await fetch(url).then(r => r.json());
    suggestions = (data.features || []).map(f => ({
      city: f.properties.city,
      postcode: f.properties.postcode,
      context: f.properties.context,
      lat: f.geometry.coordinates[1],
      lon: f.geometry.coordinates[0],
    }));
    highlightedIndex = -1;
    renderSuggestions();
  } catch {
    closeSuggestions();
  }
}

function selectSuggestion(s) {
  locationInput.value = s.city;
  closeSuggestions();
  load({ lat: s.lat, lon: s.lon });
}

locationInput.addEventListener('input', () => {
  const q = locationInput.value.trim();
  clearTimeout(suggestDebounce);
  if (q.length < 2) { closeSuggestions(); return; }
  suggestDebounce = setTimeout(() => fetchSuggestions(q), 250);
});

locationInput.addEventListener('keydown', e => {
  if (suggestions.length && suggestionsBox.classList.contains('open')) {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      highlightedIndex = (highlightedIndex + 1) % suggestions.length;
      renderSuggestions();
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      highlightedIndex = (highlightedIndex - 1 + suggestions.length) % suggestions.length;
      renderSuggestions();
      return;
    }
    if (e.key === 'Escape') { closeSuggestions(); return; }
    if (e.key === 'Enter' && highlightedIndex >= 0) {
      e.preventDefault();
      selectSuggestion(suggestions[highlightedIndex]);
      return;
    }
  }
  if (e.key === 'Enter') { closeSuggestions(); load(); }
});

suggestionsBox.addEventListener('click', e => {
  const item = e.target.closest('.suggestion-item');
  if (!item) return;
  selectSuggestion(suggestions[parseInt(item.dataset.index, 10)]);
});

document.addEventListener('click', e => {
  if (!e.target.closest('.location-wrap')) closeSuggestions();
});

document.getElementById('btn-search').addEventListener('click', () => { closeSuggestions(); load(); });

const distSlider = document.getElementById('distance-slider');
const distValueEl = document.getElementById('dist-value');
distSlider.addEventListener('input', () => {
  const v = parseInt(distSlider.value, 10);
  distanceMax = v >= DIST_SLIDER_MAX ? null : v;
  distValueEl.textContent = distanceMax === null ? 'Toutes distances' : `≤ ${distanceMax} km`;
  renderAll(conventions);
});

function clearDatePresetActive() {
  document.querySelectorAll('#date-presets button').forEach(b => b.classList.remove('active'));
}

document.getElementById('date-from').addEventListener('change', e => {
  dateFrom = e.target.value || null;
  clearDatePresetActive();
  renderAll(conventions);
});

document.getElementById('date-to').addEventListener('change', e => {
  dateTo = e.target.value || null;
  clearDatePresetActive();
  renderAll(conventions);
});

load();
</script>
