<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrap-Conventions</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --border: #2a2a3a;
    --accent: #e040fb;
    --accent2: #7c4dff;
    --text: #e8e8f0;
    --muted: #888899;
    --card-bg: #16161f;
    --green: #00e676;
    --orange: #ff9100;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1a0a2e 0%, #16082e 50%, #0d0d1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p { color: var(--muted); font-size: 0.85rem; margin-top: 0.2rem; }

  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.2rem 2rem;
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrap {
    display: flex;
    flex: 1;
    min-width: 240px;
    gap: 0.5rem;
  }

  input[type="text"] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }

  button {
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.6rem 1.2rem;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: default; }

  .sort-btns { display: flex; gap: 0.4rem; }

  .sort-btns button {
    background: var(--border);
    font-size: 0.85rem;
    padding: 0.5rem 0.9rem;
  }

  .sort-btns button.active {
    background: var(--accent);
  }

  .btn-refresh {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.8rem;
    padding: 0.5rem 0.8rem;
  }

  .btn-refresh:hover { color: var(--text); border-color: var(--accent); }

  .stats {
    padding: 0.8rem 2rem;
    color: var(--muted);
    font-size: 0.82rem;
    border-bottom: 1px solid var(--border);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
    padding: 1.5rem 2rem;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.15s, border-color 0.15s;
    display: flex;
    flex-direction: column;
  }

  .card:hover { transform: translateY(-2px); border-color: var(--accent2); }

  .card-img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    background: var(--surface);
  }

  .card-img-placeholder {
    width: 100%;
    height: 140px;
    background: linear-gradient(135deg, #1a0a2e, #0d0d1a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
  }

  .card-body { padding: 1rem; flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }

  .card-name {
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.3;
  }

  .card-name a {
    color: var(--text);
    text-decoration: none;
  }

  .card-name a:hover { color: var(--accent); }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: auto;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.25rem 0.6rem;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 500;
  }

  .badge-date { background: rgba(124, 77, 255, 0.2); color: var(--accent2); border: 1px solid rgba(124,77,255,0.3); }
  .badge-loc  { background: rgba(0, 230, 118, 0.1); color: var(--green); border: 1px solid rgba(0,230,118,0.2); }
  .badge-dist { background: rgba(255, 145, 0, 0.15); color: var(--orange); border: 1px solid rgba(255,145,0,0.3); }

  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 4rem;
    color: var(--muted);
  }

  .loader {
    grid-column: 1/-1;
    text-align: center;
    padding: 4rem;
    color: var(--muted);
  }

  .loader-dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    margin: 0 3px;
  }

  .loader-dot:nth-child(2) { animation-delay: 0.2s; }
  .loader-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-12px); }
  }

  .no-location-note {
    color: var(--muted);
    font-size: 0.8rem;
    padding: 0 2rem 0.5rem;
  }

  @media (max-width: 600px) {
    .controls { padding: 1rem; }
    .grid { padding: 1rem; }
    header { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Scrap-Conventions</h1>
    <p>Conventions manga & culture japonaise — France &amp; voisins</p>
  </div>
</header>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="location" placeholder="Ta ville (ex: Saint-Estève, Perpignan, Lyon...)" />
    <button id="btn-search">Chercher</button>
  </div>
  <div class="sort-btns">
    <button id="btn-date" class="active" onclick="setSort('date')">Par date</button>
    <button id="btn-dist" onclick="setSort('distance')">Par distance</button>
  </div>
  <button class="btn-refresh" id="btn-refresh" onclick="refresh()">Actualiser</button>
</div>

<div class="stats" id="stats"></div>
<div class="grid" id="grid">
  <div class="loader">
    <div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div>
    <p style="margin-top:1rem">Chargement des conventions...</p>
  </div>
</div>

<script>
let currentSort = 'date';
let userLat = null;
let userLon = null;
let conventions = [];

function setSort(s) {
  currentSort = s;
  document.getElementById('btn-date').classList.toggle('active', s === 'date');
  document.getElementById('btn-dist').classList.toggle('active', s === 'distance');
  render(conventions);
}

function fmtDate(iso) {
  if (!iso) return '?';
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
}

function fmtDist(km) {
  if (km === null || km === undefined) return null;
  if (km < 1) return '< 1 km';
  return `${Math.round(km)} km`;
}

function render(data) {
  const grid = document.getElementById('grid');
  const stats = document.getElementById('stats');

  let sorted = [...data];
  if (currentSort === 'distance' && userLat !== null) {
    sorted.sort((a, b) => (a.distance_km ?? 99999) - (b.distance_km ?? 99999));
  } else {
    sorted.sort((a, b) => (a.date || '9999').localeCompare(b.date || '9999'));
  }

  stats.textContent = `${sorted.length} convention${sorted.length > 1 ? 's' : ''} à venir${userLat !== null ? ' · triées par ' + (currentSort === 'distance' ? 'distance' : 'date') : ''}`;

  if (!sorted.length) {
    grid.innerHTML = '<div class="empty">Aucune convention trouvée.</div>';
    return;
  }

  grid.innerHTML = sorted.map(c => {
    const dist = fmtDist(c.distance_km);
    const imgHtml = c.image
      ? `<img class="card-img" src="${c.image}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="card-img-placeholder">🎌</div>`;

    return `
    <div class="card">
      ${imgHtml}
      <div class="card-body">
        <div class="card-name">
          ${c.url ? `<a href="${c.url}" target="_blank" rel="noopener">${c.name}</a>` : c.name}
        </div>
        <div class="card-meta">
          ${c.date ? `<span class="badge badge-date">📅 ${fmtDate(c.date)}</span>` : ''}
          ${c.location ? `<span class="badge badge-loc">📍 ${c.location}</span>` : ''}
          ${dist ? `<span class="badge badge-dist">🗺️ ${dist}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

async function load() {
  const loc = document.getElementById('location').value.trim();
  const grid = document.getElementById('grid');
  grid.innerHTML = '<div class="loader"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div><p style="margin-top:1rem">Chargement...</p></div>';

  let url = `/api/conventions?sort=${currentSort}`;
  if (loc) url += `&location=${encodeURIComponent(loc)}`;

  try {
    const resp = await fetch(url);
    const data = await resp.json();
    conventions = data.conventions;
    userLat = data.user_lat;
    userLon = data.user_lon;

    if (loc && userLat === null) {
      document.getElementById('stats').textContent = `Ville "${loc}" non trouvée, distances non disponibles.`;
    }

    render(conventions);
  } catch (e) {
    grid.innerHTML = '<div class="empty">Erreur de chargement. Réessaie.</div>';
  }
}

async function refresh() {
  const btn = document.getElementById('btn-refresh');
  btn.disabled = true;
  btn.textContent = 'En cours...';
  try {
    await fetch('/api/refresh', { method: 'POST' });
    await load();
  } finally {
    btn.disabled = false;
    btn.textContent = 'Actualiser';
  }
}

document.getElementById('btn-search').addEventListener('click', load);
document.getElementById('location').addEventListener('keydown', e => {
  if (e.key === 'Enter') load();
});

load();
</script>
</body>
</html>
